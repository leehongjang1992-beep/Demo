<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambola Master Console</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .board-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin: 1.5rem 0; }
        .board-cell { 
            background: var(--bg-input); border: 1px solid var(--border-color); 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; font-weight: 800; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .board-cell.called { background: var(--accent-success); color: #000; box-shadow: 0 0 12px var(--accent-success); }
        .master-display { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
        .mode-btn { padding: 10px 20px; font-weight: bold; font-size: 1rem; cursor: pointer; border: 2px solid transparent; border-radius: 8px; }
        .mode-active { background-color: var(--accent-success) !important; color: black !important; border-color: #fff; }
    </style>
</head>
<body>

    <div class="auth-container" id="adminAuthGate">
        <div class="auth-card">
            <h2>Housie Admin Portal</h2>
            <div class="form-group">
                <input type="password" id="adminPassInput" placeholder="Enter Admin Pin (admin123)">
            </div>
            <button class="btn btn-danger" onclick="executeAdminAuth()">Launch Control Board</button>
            <div id="authErrMsg" style="color:var(--accent-danger); display:none;"></div>
        </div>
    </div>

    <div class="app-container" id="adminMainLayout" style="display:none; max-width: 950px;">
        <header>
            <div>
                <h1 style="font-size: 1.5rem; color: var(--accent-danger); font-weight: 800;">🎙️ CONTROL DESK</h1>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="socket.emit('startRegistrationWindow')">⏳ Start 1 Min Entry</button>
                <button class="btn btn-danger" onclick="triggerReset()">🔄 Wipe Game & Chat</button>
            </div>
        </header>

        <div class="card" style="display:flex; justify-content: space-around; padding: 1rem; margin-bottom: 1rem;">
            <button id="manualModeBtn" class="mode-btn mode-active" onclick="changeEngineMode('manual')">🎮 MANUAL MODE (Click Draw)</button>
            <button id="autoModeBtn" class="mode-btn" onclick="changeEngineMode('auto')">🤖 AUTO PLAY (7s Engine Loop)</button>
        </div>

        <div class="grid-layout" style="grid-template-columns: 1.6fr 1fr;">
            <div>
                <div class="master-display">
                    <div>
                        <span>Current Ball Status</span>
                        <div id="currentBallDisplay" style="font-size: 3.5rem; font-weight: 900; color: #ffb020;">-</div>
                    </div>
                    <div>
                        <span>Engine Status</span>
                        <div id="engineStatusLabel" style="font-size: 1.2rem; font-weight: 800; color: var(--accent-success);">WAITING</div>
                    </div>
                </div>

                <div class="card">
                    <h3 id="gridTitle">🔢 Click to Draw Number</h3>
                    <div class="board-grid" id="mainAdminBoard"></div>
                </div>
            </div>

            <div class="card chat-container">
                <h3>💬 Chat Audit Workspace</h3>
                <div class="chat-logs" id="adminChatLogsArea" style="height:350px;"></div>
                <div class="chat-input-wrapper">
                    <input type="text" id="adminChatMessageField" placeholder="Broadcast text...">
                    <button class="btn btn-danger" onclick="submitAdminChatMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let activeMode = "manual";
        
        function executeAdminAuth() {
            socket.emit('adminLogin', document.getElementById('adminPassInput').value);
        }

        socket.on('adminAuthSuccess', () => {
            document.getElementById('adminAuthGate').style.display = 'none';
            document.getElementById('adminMainLayout').style.display = 'block';
            buildAdminBoard();
        });

        function buildAdminBoard() {
            const grid = document.getElementById('mainAdminBoard');
            grid.innerHTML = '';
            for(let i = 1; i <= 90; i++) {
                const cell = document.createElement('div');
                cell.className = 'board-cell';
                cell.id = `admin-num-${i}`;
                cell.textContent = i;
                cell.onclick = () => handleCellClick(i);
                grid.appendChild(cell);
            }
        }

        function changeEngineMode(mode) {
            socket.emit('switchPlayMode', mode);
        }

        function handleCellClick(num) {
            if(activeMode === "auto") {
                alert("Auto-Play ON hai! Manual click karne ke liye pehle Manual Mode toggle karein.");
                return;
            }
            if(confirm(`Send number ${num}?`)) {
                socket.emit('newNumber', num);
            }
        }

        function triggerReset() {
            if(confirm("Reset pure game records and wipe entire logs chat database?")) {
                socket.emit('resetGame');
            }
        }

        socket.on('adminDashboardUpdate', (data) => {
            document.getElementById('currentBallDisplay').textContent = data.latestBall;
            document.getElementById('engineStatusLabel').textContent = data.gameStatus;
            activeMode = data.playMode;

            if(activeMode === "auto") {
                document.getElementById('autoModeBtn').classList.add('mode-active');
                document.getElementById('manualModeBtn').classList.remove('mode-active');
                document.getElementById('gridTitle').textContent = "🤖 AUTO ENGINE DRAWING RUNNING...";
            } else {
                document.getElementById('manualModeBtn').classList.add('mode-active');
                document.getElementById('autoModeBtn').classList.remove('mode-active');
                document.getElementById('gridTitle').textContent = "🔢 Click to Draw Number Manually";
            }
            
            for(let i = 1; i <= 90; i++) {
                const cell = document.getElementById(`admin-num-${i}`);
                if(cell) {
                    if(data.calledNumbers.includes(i)) cell.classList.add('called');
                    else cell.classList.remove('called');
                }
            }
        });

        function submitAdminChatMessage() {
            const field = document.getElementById('adminChatMessageField');
            if(!field.value.trim()) return;
            socket.emit('sendMessage', field.value.trim());
            field.value = '';
        }

        socket.on('chatHistory', (history) => {
            const area = document.getElementById('adminChatLogsArea'); area.innerHTML = '';
            history.forEach(msg => area.innerHTML += `<div class="chat-msg"><span class="author">${msg.sender}:</span> ${msg.text}</div>`);
            area.scrollTop = area.scrollHeight;
        });

        socket.on('receiveMessage', (msg) => {
            const area = document.getElementById('adminChatLogsArea');
            area.innerHTML += `<div class="chat-msg"><span class="author">${msg.sender}:</span> ${msg.text}</div>`;
            area.scrollTop = area.scrollHeight;
        });
    </script>
</body>
</html>
